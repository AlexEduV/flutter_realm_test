repos:
  # 1. Runs Dart Analysis (using your local Dart install)
  - repo: local
    hooks:
      - id: dart-analyze
        name: Dart Analyze
        entry: dart analyze --fatal-infos --fatal-warnings
        language: system
        files: \.dart$
        pass_filenames: false

